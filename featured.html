<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Featured Artist — Buda Collective</title>
  <link rel="stylesheet" href="featured.css">
</head>

<body>

  <a class="back-link" href="index.html">
    ← Back to showcase
  </a>


  <div id="state-loading" class="state-msg">
    Loading artist…
  </div>


  <div id="state-error" class="state-msg" style="display:none;">
    We couldn't find this profile, or it hasn't been approved yet.
    <br>
    <a href="index.html">
      Back to showcase
    </a>
  </div>



  <div id="artistProfile" class="profile" style="display:none;">


    <!-- HERO IMAGE -->
    <img 
      id="pHero" 
      class="hero" 
      src="" 
      alt=""
    >



    <div class="profile-body">


      <!-- AVATAR -->
      <img 
        id="pAvatar" 
        class="avatar" 
        src="" 
        alt=""
      >



      <!-- NAME -->
      <h1 id="pName"></h1>



      <!-- SUBTITLE -->
      <p 
        id="pSubtitle" 
        class="subtitle">
      </p>



      <!-- BIO -->
      <p 
        id="pBio" 
        class="bio">
      </p>



      <!-- ARTIST STATEMENT -->
      <p 
        id="artistStatement" 
        class="statement" 
        style="display:none;">
      </p>




      <!-- X PROFILE -->
      <a 
        id="pXLink" 
        class="x-link" 
        href="#" 
        target="_blank" 
        rel="noopener noreferrer">
        View profile on X ↗
      </a>




      <!-- YOUTUBE PROCESS VIDEO -->
      <a 
        id="artistYoutube"
        class="youtube-link"
        href="#"
        target="_blank"
        rel="noopener noreferrer"
        style="display:none;">
        Watch process video ↗
      </a>




      <!-- WORKS -->
      <h2 
        id="worksHeading" 
        class="works-heading" 
        style="display:none;">
        Works
      </h2>



      <div 
        id="worksGrid" 
        class="works-grid">
      </div>



    </div>


  </div>





  <!-- SUPABASE -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script src="config.js"></script>

  <script src="supabase.js"></script>

  <script src="featured.js"></script>


</body>
</html>
