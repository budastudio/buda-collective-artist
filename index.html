<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buda Collective Artist - Soft Field System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.min.js"></script>

    <style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background-color: #0c0c0e;
    touch-action: none;
    overscroll-behavior: none;
}
canvas { display: block; }
    </style>
</head>

<body>

<script>

let bg;
let frames = [];
let marcoCommon, marcoRare, marcoEpic, marcoLegendary, marcoArtist;
let logoArtista;
let archivosRotos = [];

let cuadroArrastrado = null;
let distCentroX = 0;
let distCentroY = 0;
let fueArrastrado = false;

// ==========================
// ARTISTAS
// ==========================
const datosArtistas = [
  { nombre: "Dorthe's", rareza: "rare", link: "https://x.com/DortheJOC" },
  { nombre: "Ivan Hugo", rareza: "rare", link: "https://x.com/ivnhgo" },
  { nombre: "Emoji", rareza: "common", link: "https://x.com/_EM0JI" },
  { nombre: "Aislandart", rareza: "common", link: "https://x.com/aislandart" },
  { nombre: "enne_rhn", rareza: "rare", link: "https://x.com/enne_rhn96" },
  { nombre: "sunnydayz.eth", rareza: "common", link: "https://x.com/sunnydayzsoon" },
  { nombre: "reylarsdam", rareza: "epic", link: "https://x.com/reylarsdam" },
  { nombre: "EightyEight", rareza: "epic", link: "https://x.com/CryptoShawn88" },
  { nombre: "VJdeliria", rareza: "epic", link: "https://x.com/VJdeliria" },
  { nombre: "Blue2black", rareza: "rare", link: "https://x.com/Blue2black" },
  { nombre: "nikolekapo_nft", rareza: "rare", link: "https://x.com/nikolekapo_nft" },
  { nombre: "wallplugnft", rareza: "rare", link: "https://x.com/wallplugnft" },
  { nombre: "Adolfochzs", rareza: "epic", link: "https://x.com/adolfochzs" },
  { nombre: "sashelka", rareza: "rare", link: "https://x.com/sashelka" },
  { nombre: "Chrisland", rareza: "rare", link: "https://x.com/Chrisland1405" },
  { nombre: "EmpressTrash", rareza: "common", link: "https://x.com/EmpressTrash" },
  { nombre: "mtropedroangel", rareza: "legendary", link: "https://x.com/mtropedroangel" },
  { nombre: "gulbakanozge", rareza: "common", link: "https://x.com/gulbakanozge" },
  { nombre: "StrokeDriven", rareza: "common", link: "https://x.com/StrokeDriven" },
  { nombre: "Aoifeodwyer", rareza: "common", link: "https://x.com/Aoifeodwyer" },
  { nombre: "Ivonnespectre", rareza: "common", link: "https://x.com/Ivonnespectre" },
  { nombre: "ernestoasch", rareza: "common", link: "https://x.com/ernestoasch" },
  { nombre: "HuemansUniverse", rareza: "common", link: "https://x.com/HuemansUniverse" }
];

function preload() {
  bg = loadImage("obra-background.jpg");
  marcoCommon = loadImage("marco-common.png");
  marcoRare = loadImage("marco-rare.png");
  marcoEpic = loadImage("marco-epic.png");
  marcoLegendary = loadImage("marco-legendary.png");
  logoArtista = loadImage("logo-artista.png");
  marcoArtist = loadImage("marco-artista.png");

  for (let i = 0; i < datosArtistas.length; i++) {
    datosArtistas[i].imgCargada = loadImage(`pfp${i+1}.png`);
  }
}

function setup() {
  createCanvas(windowWidth, windowHeight);
  init();
  cargar();
  if (windowWidth < 768) frameRate(45);
}

function init() {
  frames = [];

  // logo central
  frames.push({
    pfp: logoArtista,
    x: width/2,
    y: height/2,
    size: 110,
    vx: 0,
    vy: 0,
    radius: 55,
    rarity: "artist",
    nombre: "Buda Studio",
    link: "https://x.com/budastudio_nft"
  });
}

function cargar() {
  let isMobile = windowWidth < 768;
  let margin = isMobile ? 60 : 20;

  for (let a of datosArtistas) {
    let size = isMobile ? random(100, 130) : random(90, 120);

    frames.push({
      pfp: a.imgCargada,
      x: random(margin, width - margin),
      y: random(margin, height - margin),
      size,
      vx: random(-0.3, 0.3),
      vy: random(-0.3, 0.3),
      radius: size/2,
      rarity: a.rareza,
      nombre: a.nombre,
      link: a.link
    });
  }
}

function draw() {
  background(10, 10, 14);

  actualizarCampoFuerzas();
  drawFrames();
}

function actualizarCampoFuerzas() {

  let centerX = width/2;
  let centerY = height/2;

  let isMobile = windowWidth < 768;

  for (let f of frames) {
    if (f === cuadroArrastrado) continue;

    // 🔮 ATRACCIÓN SUAVE AL CENTRO
    let dx = centerX - f.x;
    let dy = centerY - f.y;

    f.vx += dx * (isMobile ? 0.00001 : 0.00002);
    f.vy += dy * (isMobile ? 0.00001 : 0.00002);

    // 🌫️ INERCIA
    f.vx *= isMobile ? 0.985 : 0.99;
    f.vy *= isMobile ? 0.985 : 0.99;

    f.x += f.vx;
    f.y += f.vy;
  }

  // 🌌 REPULSIÓN SUAVE GLOBAL
  for (let i = 0; i < frames.length; i++) {
    for (let j = i + 1; j < frames.length; j++) {

      let a = frames[i];
      let b = frames[j];

      let dx = b.x - a.x;
      let dy = b.y - a.y;
      let d = sqrt(dx*dx + dy*dy);

      let minDist = (a.radius + b.radius) * 0.9;

      if (d < minDist && d > 0.01) {
        let force = (minDist - d) * (windowWidth < 768 ? 0.0008 : 0.0015);

        let nx = dx / d;
        let ny = dy / d;

        a.vx -= nx * force;
        a.vy -= ny * force;

        b.vx += nx * force;
        b.vy += ny * force;
      }
    }
  }

  // bordes suaves
  for (let f of frames) {
    let pad = 40;

    if (f.x < pad) f.vx += 0.05;
    if (f.x > width - pad) f.vx -= 0.05;
    if (f.y < pad) f.vy += 0.05;
    if (f.y > height - pad) f.vy -= 0.05;
  }
}

function drawFrames() {
  for (let f of frames) {
    push();
    translate(f.x, f.y);

    if (f.pfp) {
      image(f.pfp, -f.radius, -f.radius, f.size, f.size);
    }

    pop();
  }
}

function mousePressed() {
  for (let f of frames) {
    let d = dist(mouseX, mouseY, f.x, f.y);
    if (d < f.radius) {
      cuadroArrastrado = f;
      break;
    }
  }
}

function mouseReleased() {
  cuadroArrastrado = null;
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}

</script>

</body>
</html>
