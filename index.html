<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buda Collective Artist - Live Showcase</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.min.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #0c0c0e; font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif; }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }

        /* --- CONTENEDOR EN COLOR NEGRO TRASLÚCIDO (POR ENCIMA DE TODO) --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.75); /* Negro traslúcido intenso para cubrir las burbujas */
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease, backdrop-filter 0.4s ease;
            z-index: 9999; /* Forzado por encima de cualquier elemento */
        }

        /* Cuando está activo, se muestra y permite clics */
        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* --- TARJETA CENTRAL ENFOQUE CINEMATOGRÁFICO --- */
        .modal-card {
            background: #121216;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            width: 90%;
            max-width: 450px;
            padding: 30px 24px 24px 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            color: #ffffff;
            position: relative;
            transform: scale(0.85);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
            box-sizing: border-box;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-overlay.active .modal-card {
            transform: scale(1);
        }

        /* Botón de cerrar X */
        .btn-close {
            position: absolute;
            top: 15px;
            right: 20px;
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            font-size: 28px;
            cursor: pointer;
            transition: color 0.2s, transform 0.2s;
            line-height: 1;
            z-index: 10000;
        }

        .btn-close:hover { 
            color: #ffffff; 
            transform: scale(1.15);
        }

        .artist-hero {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: -45px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .artist-avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 4px solid #121216;
            background: #121216;
            position: relative;
            margin: 0 auto 12px auto;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            display: block;
            object-fit: cover;
        }

        .artist-name { font-size: 24px; font-weight: 700; margin: 0 0 6px 0; letter-spacing: -0.5px; }
        .artist-subtitle { font-size: 13px; color: rgba(255, 255, 255, 0.6); margin: 0 0 12px 0; line-height: 1.4; }
        
        /* Botón de Redes / X Profile */
        .artist-social-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: #ffffff;
            color: #000000;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 20px;
            margin-bottom: 16px;
            transition: background 0.2s, transform 0.2s;
        }
        .artist-social-btn:hover {
            background: #e2e2e2;
            transform: scale(1.03);
        }

        .artist-bio { font-size: 14px; color: rgba(255, 255, 255, 0.85); line-height: 1.5; margin: 0 0 24px 0; padding: 0 10px; }

        .works-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            text-align: left;
        }

        .work-item img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        .work-title { font-size: 12px; font-weight: 500; margin: 5px 0 2px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .work-year { font-size: 11px; color: rgba(255, 255, 255, 0.4); }
    </style>
</head>
<body>

<div class="modal-overlay" id="artistModal" onclick="cerrarModalDesdeOverlay(event)">
    <div class="modal-card">
        <button class="btn-close" onclick="event.stopPropagation(); cerrarModal();">&times;</button>
        <img id="modalHero" class="artist-hero" src="" alt="Hero">
        <img id="modalAvatar" class="artist-avatar" src="" alt="Avatar">
        <h2 id="modalName" class="artist-name"></h2>
        <p id="modalSubtitle" class="artist-subtitle"></p>
        
        <a id="modalSocialLink" class="artist-social-btn" href="#" target="_blank" rel="noopener noreferrer" style="display: none;">
            Seguir en X
        </a>

        <p id="modalBio" class="artist-bio"></p>
        
        <div class="works-container" id="modalWorks"></div>
    </div>
</div>

<script>
// =========================================================================
// DATOS DE LEONARDO ACTUALIZADOS CON LA PROPIEDAD CLICK
// =========================================================================
const datosLeonardo = {
  "id": "buda",
  "name": "Leonardo Scarcia",
  "subtitle": "Visual Artist · Animator · Founder of Buda Collective",
  "avatar": "logo-artista.png",
  "hero": "obra-leonardo-01.jpg",
  "bio": "Visual artist working across painting, animation, AI and digital art.",
  "social": { 
    "x": {
      "link": "https://x.com/budastudio_nft",
      "click": "https://x.com/budastudio_nft"
    }
  },
  "works": [
    { "title": "Entre el Velo y la Piel #1", "image": "obra-leonardo-01.jpg", "year": "2026" },
    { "title": "Entre el Velo y la Piel #2", "image": "obra-leonardo-02.jpg", "year": "2026" }
  ]
};

let bg;
let frames = [];
let maxFrames = 80;
let modalAbierto = false; 

let marcoCommon, marcoRare, marcoEpic, marcoLegendary, marcoArtist;
let logoArtista;
let archivosRotos = [];

let cuadroArrastrado = null;
let mouseXAnterior = 0;
let mouseYAnterior = 0;
let distCentroX = 0;
let distCentroY = 0;
let fueArrastrado = false;

const datosArtistas = [
  { nombre: "Dorthe's",       rareza: "rare",      link: "https://x.com/DortheJOC" },
  { nombre: "Ivan Hugo",      rareza: "rare",      link: "https://x.com/ivnhgo" },
  { nombre: "Emoji",          rareza: "common",    link: "https://x.com/_EM0JI" },
  { nombre: "Aislandart",     rareza: "common",    link: "https://x.com/aislandart" },
  { nombre: "enne_rhn",       rareza: "rare",      link: "https://x.com/enne_rhn96" },
  { nombre: "sunnydayz.eth",  rareza: "common",    link: "https://x.com/sunnydayzsoon" },
  { nombre: "reylarsdam",     rareza: "epic",      link: "https://x.com/reylarsdam" },
  { nombre: "EightyEight",    rareza: "epic",      link: "https://x.com/CryptoShawn88" },
  { nombre: "VJdeliria",      rareza: "epic",      link: "https://x.com/VJdeliria" },
  { nombre: "Blue2black",     rareza: "rare",      link: "https://x.com/Blue2black" },
  { nombre: "nikolekapo_nft", rareza: "rare",      link: "https://x.com/nikolekapo_nft" },
  { nombre: "wallplugnft",    rareza: "rare",      link: "https://x.com/wallplugnft" },
  { nombre: "Adolfochzs",     rareza: "epic",      link: "https://x.com/adolfochzs" },
  { nombre: "sashelka",       rareza: "rare",      link: "https://x.com/sashelka" },
  { nombre: "Chrisland",      rareza: "rare",      link: "https://x.com/Chrisland1405" },
  { nombre: "EmpressTrash",   rareza: "common",    link: "https://x.com/EmpressTrash" },
  { nombre: "mtropedroangel", rareza: "legendary", link: "https://x.com/mtropedroangel" },
  { nombre: "gulbakanozge",   rareza: "common",    link: "https://x.com/gulbakanozge" }, 
  { nombre: "StrokeDriven",   rareza: "common",    link: "https://x.com/StrokeDriven" }, 
  { nombre: "Aoifeodwyer",    rareza: "common",    link: "https://x.com/Aoifeodwyer" }, 
  { nombre: "Ivonnespectre",  rareza: "common",    link: "https://x.com/Ivonnespectre" }, 
  { nombre: "ernestoasch",    rareza: "common",    link: "https://x.com/ernestoasch" },
  { nombre: "HuemansUniverse",rareza: "common",    link: "https://x.com/HuemansUniverse" }, 
  { nombre: "B_DWIL",         rareza: "common",    link: "https://x.com/@B_DWIL" }  
];

function cargarConSeguridad(ruta) {
  return loadImage(ruta, 
    img => console.log("Cargado ok: " + ruta), 
    err => {
      console.error("Error cargando: " + ruta);
      archivosRotos.push(ruta);
    }
  );
}

function preload() {
  bg = cargarConSeguridad("obra-background.jpg"); 
  marcoCommon = cargarConSeguridad("marco-common.png");
  marcoRare = cargarConSeguridad("marco-rare.png");
  marcoEpic = cargarConSeguridad("marco-epic.png");
  marcoLegendary = cargarConSeguridad("marco-legendary.png");
  logoArtista = cargarConSeguridad("logo-artista.png"); 
  marcoArtist = cargarConSeguridad("marco-artista.png"); 
  
  for (let i = 0; i < datosArtistas.length; i++) {
    let indexArchivo = i + 1;
    let rutaPFP = `pfp${indexArchivo}.png`; 
    datosArtistas[i].imgCargada = cargarConSeguridad(rutaPFP);
  }
}

function setup() {
  createCanvas(windowWidth, windowHeight);
  initFloatingSystem();
  cargarArtistasManuales();
}

function initFloatingSystem() {
  frames = [];
  let tamañoLogo = 100; 
  
  frames.push({
    pfp: logoArtista, 
    rarity: "artist", 
    nombre: "Buda Studio",
    link: "MODAL_BUDA", 
    isFixed: false, 
    x: random(width * 0.2, width * 0.8), 
    y: random(height * 0.2, height * 0.8),
    size: tamañoLogo,
    vx: 0, vy: 0, 
    t: random(1000),
    radius: tamañoLogo / 2,
    isDragging: false,
    escalaAparicion: 0 
  });

  for (let i = 0; i < 30; i++) {
    let tamaño = random(70, 115);
    let rarezas = ["common", "rare", "epic", "legendary"];
    let r = random() > 0.85 ? random(rarezas.slice(1)) : "common"; 
    
    frames.push({
      pfp: null, 
      rarity: r,
      nombre: "", 
      link: null,
      isFixed: false,
      x: random(0, width - tamaño),
      y: random(0, height - tamaño),
      size: tamaño,
      vx: 0, vy: 0,
      t: random(1000),
      col: color(random(100, 255), random(100, 255), random(220, 255)),
      radius: tamaño / 2,
      isDragging: false,
      escalaAparicion: 0
    });
  }
}

function cargarArtistasManuales() {
  for (let i = 0; i < datosArtistas.length; i++) {
    let artista = datosArtistas[i];
    let tamaño = random(95, 130);
    
    frames.push({
      pfp: artista.imgCargada,
      rarity: artista.rareza,
      nombre: artista.nombre,
      link: artista.link || null,
      isFixed: false,
      x: random(0, width - tamaño),
      y: random(0, height - tamaño),
      size: tamaño,
      vx: 0, vy: 0,
      t: random(1000),
      radius: tamaño / 2,
      isDragging: false,
      escalaAparicion: 0
    });
  }
}

function draw() {
  if (archivosRotos.length > 0) {
    background(20, 10, 15);
    fill(255, 50, 50);
    textSize(20);
    textAlign(LEFT, TOP);
    text("⚠️ ERROR DE CARGA:", 30, 30);
    return;
  }

  if (bg && bg.width > 1) {
    image(bg, 0, 0, width, height);
  } else {
    background(12, 12, 14);
  }
  
  if (!modalAbierto) {
    actualizarArrastre();
    aplicarColisiones();
  }

  let cuadroInteractuado = null;
  let alguienTieneFocus = false;

  for (let f of frames) {
    if (f.escalaAparicion < 1) {
      f.escalaAparicion += 0.01; 
      if (f.escalaAparicion >= 1) {
        f.escalaAparicion = 1;
        f.vx = random(-0.2, 0.2);
        f.vy = random(-0.2, 0.2);
      }
    }

    drawAndMoveFrame(f);
    
    let centroX = f.x + f.radius;
    let centroY = f.y + f.radius;
    let d = dist(mouseX, mouseY, centroX, centroY);
    
    if ((d < f.radius * f.escalaAparicion || f.isDragging) && f.nombre !== "" && !modalAbierto) {
      cuadroInteractuado = f;
      if (f.link) alguienTieneFocus = true;
    }
  }

  if ((alguienTieneFocus || cuadroArrastrado) && !modalAbierto) {
    cursor(HAND);
  } else {
    cursor(ARROW);
  }

  if (cuadroInteractuado && !modalAbierto) {
    let textoCartel = cuadroInteractuado.link === "MODAL_BUDA" ? `${cuadroInteractuado.nombre} ✨` : `${cuadroInteractuado.nombre} 🔗`;
    dibujarCartelNombre(textoCartel, mouseX, mouseY);
  }
}

function drawAndMoveFrame(f) {
  if (!f.isDragging && !modalAbierto) {
    f.x += f.vx;
    f.y += f.vy;

    if (f.x < 0 || f.x > width - f.size) f.vx *= -1;
    if (f.y < 0 || f.y > height - f.size) f.vy *= -1;
  }

  push();
  translate(f.x + f.radius, f.y + f.radius);
  scale(f.escalaAparicion);
  translate(-f.radius, -f.radius);

  let centroX_local = f.radius;
  let centroY_local = f.radius;
  let dMouse = dist(mouseX, mouseY, f.x + centroX_local, f.y + centroY_local);
  
  if ((dMouse < f.radius || f.isDragging) && f.nombre !== "" && !modalAbierto) {
    noStroke();
    for (let i = 15; i > 0; i--) {
      fill(255, 215, 0, 15 - i); 
      ellipse(centroX_local, centroY_local, f.size + (i * 4));
    }
  }

  if (f.pfp && f.pfp.width > 1) {
    image(f.pfp, 0, 0, f.size, f.size);
  } else {
    let pulse = sin(frameCount * 0.02 + f.t) * 15;
    fill(red(f.col), green(f.col), blue(f.col), 25 + pulse);
    noStroke();
    rect(0, 0, f.size, f.size);
  }

  if (f.rarity === "artist") {
    let marcoParaDibujar = (marcoArtist && marcoArtist.width > 1) ? marcoArtist : marcoLegendary;
    if (marcoParaDibujar && marcoParaDibujar.width > 1) image(marcoParaDibujar, 0, 0, f.size, f.size);
  }
  else if (f.rarity === "common" && marcoCommon && marcoCommon.width > 1) image(marcoCommon, 0, 0, f.size, f.size);
  else if (f.rarity === "rare" && marcoRare && marcoRare.width > 1) image(marcoRare, 0, 0, f.size, f.size);
  else if (f.rarity === "epic" && marcoEpic && marcoEpic.width > 1) image(marcoEpic, 0, 0, f.size, f.size);
  else if (f.rarity === "legendary" && marcoLegendary && marcoLegendary.width > 1) image(marcoLegendary, 0, 0, f.size, f.size);

  pop();
}

function aplicarColisiones() {
  for (let i = 0; i < frames.length; i++) {
    for (let j = i + 1; j < frames.length; j++) {
      let f1 = frames[i];
      let f2 = frames[j];

      let c1x = f1.x + f1.radius;
      let c1y = f1.y + f1.radius;
      let c2x = f2.x + f2.radius;
      let c2y = f2.y + f2.radius;

      let dx = c2x - c1x;
      let dy = c2y - c1y;
      let distancia = sqrt(dx * dx + dy * dy);
      let distanciaMinima = (f1.radius * f1.escalaAparicion) + (f2.radius * f2.escalaAparicion);

      if (distancia < distanciaMinima && distancia > 0) {
        let angulo = atan2(dy, dx);
        let superposicion = distanciaMinima - distancia;
        
        if (f1.isDragging) {
          f2.x += cos(angulo) * superposicion; f2.y += sin(angulo) * superposicion;
        } else if (f2.isDragging) {
          f1.x -= cos(angulo) * superposicion; f1.y -= sin(angulo) * superposicion;
        } else {
          f1.x -= cos(angulo) * (superposicion * 0.5);
          f1.y -= sin(angulo) * (superposicion * 0.5);
          f2.x += cos(angulo) * (superposicion * 0.5);
          f2.y += sin(angulo) * (superposicion * 0.5);

          let ax = cos(angulo) * 0.04;
          let ay = sin(angulo) * 0.04;
          f1.vx -= ax; f1.vy -= ay;
          f2.vx += ax; f2.vy += ay;
        }
      }
    }
  }
}

function mousePressed() {
  if (modalAbierto) return;
  for (let f of frames) {
    let centroX = f.x + f.radius;
    let centroY = f.y + f.radius;
    let d = dist(mouseX, mouseY, centroX, centroY);
    
    if (d < f.radius * f.escalaAparicion) {
      cuadroArrastrado = f;
      f.isDragging = true;
      fueArrastrado = false;
      distCentroX = mouseX - f.x;
      distCentroY = mouseY - f.y;
      mouseXAnterior = mouseX;
      mouseYAnterior = mouseY;
      break;
    }
  }
}

function actualizarArrastre() {
  if (cuadroArrastrado && !modalAbierto) {
    cuadroArrastrado.x = mouseX - distCentroX;
    cuadroArrastrado.y = mouseY - distCentroY;
    
    if (cuadroArrastrado.x < 0) cuadroArrastrado.x = 0;
    if (cuadroArrastrado.x > width - cuadroArrastrado.size) cuadroArrastrado.x = width - cuadroArrastrado.size;
    if (cuadroArrastrado.y < 0) cuadroArrastrado.y = 0;
    if (cuadroArrastrado.y > height - cuadroArrastrado.size) cuadroArrastrado.y = height - cuadroArrastrado.size;

    if (dist(mouseX, mouseY, mouseXAnterior, mouseYAnterior) > 2) {
      fueArrastrado = true;
    }
  }
}

function mouseReleased() {
  if (cuadroArrastrado) {
    cuadroArrastrado.isDragging = false;
    let fuerzaLanzamiento = 0.15;
    cuadroArrastrado.vx = (mouseX - mouseXAnterior) * fuerzaLanzamiento;
    cuadroArrastrado.vy = (mouseY - mouseYAnterior) * fuerzaLanzamiento;
    
    let limiteVelocidad = 3;
    cuadroArrastrado.vx = constrain(cuadroArrastrado.vx, -limiteVelocidad, limiteVelocidad);
    cuadroArrastrado.vy = constrain(cuadroArrastrado.vy, -limiteVelocidad, limiteVelocidad);
    
    if (abs(cuadroArrastrado.vx) < 0.05 && abs(cuadroArrastrado.vy) < 0.05) {
      cuadroArrastrado.vx = random(-0.2, 0.2);
      cuadroArrastrado.vy = random(-0.2, 0.2);
    }
    cuadroArrastrado = null;
  }
}

function mouseClicked() {
  if (modalAbierto) return;
  if (!fueArrastrado) {
    for (let f of frames) {
      let centroX = f.x + f.radius;
      let centroY = f.y + f.radius;
      let d = dist(mouseX, mouseY, centroX, centroY);
      
      if (d < f.radius * f.escalaAparicion && f.link && f.link !== "") {
        if (f.link === "MODAL_BUDA") {
          abrirModalArtista(datosLeonardo);
        } else {
          window.open(f.link, '_blank'); 
        }
        break; 
      }
    }
  }
}

function dibujarCartelNombre(txt, mx, my) {
  push();
  textSize(14);
  let txtWidth = textWidth(txt) + 20;
  let txtHeight = 28;
  let cx = mx + 15;
  let cy = my - 15;
  if (cx + txtWidth > width) cx = mx - txtWidth - 5;
  if (cy + txtHeight > height) cy = height - txtHeight - 5;

  fill(15, 15, 18, 240);
  stroke(255, 255, 255, 50);
  strokeWeight(1);
  rect(cx, cy, txtWidth, txtHeight, 6);

  noStroke();
  fill(255);
  textAlign(CENTER, CENTER);
  text(txt, cx + txtWidth / 2, cy + txtHeight / 2);
  pop();
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}

// =========================================================================
// INTERFAZ MODAL CORREGIDA CON ENLACE ESTRUCTURADO (.click)
// =========================================================================
function abrirModalArtista(data) {
  modalAbierto = true;
  
  document.getElementById('modalHero').src = data.hero;
  document.getElementById('modalAvatar').src = data.avatar;
  document.getElementById('modalName').innerText = data.name;
  document.getElementById('modalSubtitle').innerText = data.subtitle;
  document.getElementById('modalBio').innerText = data.bio;
  
  // Solución aquí: busca correctamente la propiedad .click del nuevo JSON estructurado
  let socialBtn = document.getElementById('modalSocialLink');
  if (data.social && data.social.x && data.social.x.click) {
      socialBtn.href = data.social.x.click;
      socialBtn.style.display = 'inline-flex';
  } else {
      socialBtn.style.display = 'none';
  }
  
  let containerObras = document.getElementById('modalWorks');
  containerObras.innerHTML = '';
  
  data.works.forEach(obra => {
    let itemHtml = `
      <div class="work-item">
        <img src="${obra.image}" alt="${obra.title}">
        <p class="work-title">${obra.title}</p>
        <p class="work-year">${obra.year}</p>
      </div>
    `;
    containerObras.innerHTML += itemHtml;
  });

  document.getElementById('artistModal').classList.add('active');
}

function cerrarModal() {
  document.getElementById('artistModal').classList.remove('active');
  setTimeout(() => { modalAbierto = false; }, 400);
}

function cerrarModalDesdeOverlay(event) {
  if (event.target === document.getElementById('artistModal')) {
    cerrarModal();
  }
}

window.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && modalAbierto) {
    cerrarModal();
  }
});
</script>

</body>
</html>
