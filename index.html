<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buda Collective Artist - Live Showcase</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.min.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #0c0c0e; }
        canvas { display: block; }
    </style>
</head>
<body>

<script>
let bg;
let frames = [];
let maxFrames = 80;

// Variables para imágenes fijas
let marcoCommon, marcoRare, marcoEpic, marcoLegendary, marcoArtist;
let logoArtista;

// =========================================================================
// 🔧 CONTROL DE ARTISTAS MANUAL (Configurá acá tus 3 primeros amigos)
// =========================================================================
const datosArtistas = [
  { nombre: "Artista VIP 1", rareza: "rare" },       // Datos para pfp1.png
  { nombre: "Buda Master",   rareza: "legendary" },  // Datos para pfp2.png
  { nombre: "Crypto Juan",   rareza: "epic" }        // Datos para pfp3.png
  // Cuando tengas el 4°, agregás una coma arriba y ponés: { nombre: "Nombre", rareza: "common" }
];

function preload() {
  // 1. Carga del fondo de la obra
  bg = loadImage("obra-background.jpg"); 
  
  // 2. Carga de los marcos estándar (Deben estar en tu repositorio)
  marcoCommon = loadImage("marco-common.png");
  marcoRare = loadImage("marco-rare.png");
  marcoEpic = loadImage("marco-epic.png");
  marcoLegendary = loadImage("marco-legendary.png");
  
  // 3. Carga de tu Logotipo y su Marco de Artista en PNG
  logoArtista = loadImage("logo-artista.png"); 
  marcoArtist = loadImage("marco-artista.png"); 
  
  // 4. Carga automática de las PFPs locales según tu lista de arriba
  for (let i = 0; i < datosArtistas.length; i++) {
    let indexArchivo = i + 1;
    datosArtistas[i].imgCargada = loadImage(`pfps/pfp${indexArchivo}.png`);
  }
}

function setup() {
  createCanvas(windowWidth, windowHeight);
  initFloatingSystem();
  
  // Carga los artistas locales al sistema flotante de p5.js
  cargarArtistasManuales();
}

function initFloatingSystem() {
  frames = [];
  
  // 🎨 TU LOGO FIJO PRINCIPAL (Siempre aparece primero)
  let tamañoLogo = 100; 
  frames.push({
    pfp: logoArtista, 
    rarity: "artist", 
    nombre: "Buda Co. Creator",
    isFixed: true, 
    x: random(width * 0.2, width * 0.8), 
    y: random(height * 0.2, height * 0.8),
    size: tamañoLogo,
    vx: random(-0.15, 0.15), 
    vy: random(-0.15, 0.15), 
    t: random(1000)
  });

  // Los cuadros místicos iniciales genéricos de fondo (ajustados a 46 para rellenar)
  for (let i = 0; i < 46; i++) {
    let tamaño = random(70, 115);
    let rarezas = ["common", "rare", "epic", "legendary"];
    let r = random() > 0.85 ? random(rarezas.slice(1)) : "common"; 
    
    frames.push({
      pfp: null, 
      rarity: r,
      nombre: "", // Los vacíos no muestran cartel
      isFixed: false,
      x: random(0, width - tamaño),
      y: random(0, height - tamaño),
      size: tamaño,
      vx: random(-0.2, 0.2), 
      vy: random(-0.2, 0.2), 
      t: random(1000),
      col: color(random(100, 255), random(100, 255), random(220, 255)) 
    });
  }
}

function cargarArtistasManuales() {
  // Inyecta tus imágenes locales adentro de los cuadros flotantes activos
  for (let i = 0; i < datosArtistas.length; i++) {
    let artista = datosArtistas[i];
    let tamaño = random(90, 140);
    
    frames.push({
      pfp: artista.imgCargada,
      rarity: artista.rareza,
      nombre: artista.nombre,
      isFixed: false,
      x: random(0, width - tamaño),
      y: random(0, height - tamaño),
      size: tamaño,
      vx: random(-0.25, 0.25), 
      vy: random(-0.25, 0.25),
      t: random(1000)
    });
  }
}

function draw() {
  image(bg, 0, 0, width, height);
  
  let cuadroInteractuado = null;

  for (let f of frames) {
    drawAndMoveFrame(f);
    
    // Verifica si el mouse está sobre este cuadro
    if (mouseX > f.x && mouseX < f.x + f.size && mouseY > f.y && mouseY < f.y + f.size) {
      if (f.nombre !== "") {
        cuadroInteractuado = f; // Guarda cuál está tocando el mouse
      }
    }
  }

  // ✨ LOGICA DEL ROLLOVER (Dibuja el cartelito del nombre arriba de todo)
  if (cuadroInteractuado) {
    dibujarCartelNombre(cuadroInteractuado.nombre, mouseX, mouseY);
  }
}

function drawAndMoveFrame(f) {
  f.x += f.vx;
  f.y += f.vy;

  if (f.x < 0 || f.x > width - f.size) f.vx *= -1;
  if (f.y < 0 || f.y > height - f.size) f.vy *= -1;

  push();
  translate(f.x, f.y);

  // 1. Capa de Fondo (Si hay logo/PFP dibuja la imagen, si no, el abstracto)
  if (f.pfp) {
    image(f.pfp, 0, 0, f.size, f.size);
  } else {
    let pulse = sin(frameCount * 0.02 + f.t) * 15;
    fill(red(f.col), green(f.col), blue(f.col), 25 + pulse);
    noStroke();
    rect(0, 0, f.size, f.size);
    
    fill(255, 40 + pulse);
    if (f.rarity === "legendary" || f.rarity === "epic") {
      ellipse(f.size/2, f.size/2, f.size * 0.4);
    }
  }

  // 2. Capa de Frente (El marco PNG transparente encima)
  if (f.rarity === "artist") {
    let marcoParaDibujar = (marcoArtist && marcoArtist.width > 1) ? marcoArtist : marcoLegendary;
    image(marcoParaDibujar, 0, 0, f.size, f.size);
  }
  else if (f.rarity === "common") image(marcoCommon, 0, 0, f.size, f.size);
  else if (f.rarity === "rare") image(marcoRare, 0, 0, f.size, f.size);
  else if (f.rarity === "epic") image(marcoEpic, 0, 0, f.size, f.size);
  else if (f.rarity === "legendary") image(marcoLegendary, 0, 0, f.size, f.size);

  pop();
}

// Función estética para el cartel flotante del Rollover
function dibujarCartelNombre(txt, mx, my) {
  push();
  textSize(14);
  let txtWidth = textWidth(txt) + 20;
  let txtHeight = 28;
  
  // Posición del cartel un poquito al costado del mouse
  let cx = mx + 15;
  let cy = my - 15;
  
  // Evita que el cartel se salga de la pantalla por la derecha o abajo
  if (cx + txtWidth > width) cx = mx - txtWidth - 5;
  if (cy + txtHeight > height) cy = height - txtHeight - 5;

  // Fondo del cartel (Negro translúcido elegante con borde sutil)
  fill(15, 15, 18, 230);
  stroke(255, 255, 255, 40);
  strokeWeight(1);
  rect(cx, cy, txtWidth, txtHeight, 6);

  // Texto del nombre
  noStroke();
  fill(255);
  textAlign(CENTER, CENTER);
  text(txt, cx + txtWidth / 2, cy + txtHeight / 2);
  pop();
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>

</body>
</html>
