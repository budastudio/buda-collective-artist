<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buda Collective Artist - Live Showcase</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.min.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #0c0c0e; }
        canvas { display: block; }
    </style>
</head>
<body>

<script>
let bg;
let frames = [];
let maxFrames = 80;

let marcoCommon, marcoRare, marcoEpic, marcoLegendary, marcoArtist;
let logoArtista;
let archivosRotos = [];

// Variables para el control del Drag
let cuadroArrastrado = null;
let mouseXAnterior = 0;
let mouseYAnterior = 0;
let distCentroX = 0;
let distCentroY = 0;
let fueArrastrado = false; // Evita abrir links por error al arrastrar

// =========================================================================
// 🔧 CONTROL DE ARTISTAS MANUAL (Tus 11 artistas intactos)
// =========================================================================
const datosArtistas = [
  { nombre: "Dorthe's",       rareza: "rare",      link: "https://x.com/DortheJOC" }, // pfp1.png
  { nombre: "Ivan Hugo",      rareza: "rare",      link: "https://x.com/ivnhgo" }, // pfp2.png
  { nombre: "Emoji",          rareza: "common",    link: "https://x.com/_EM0JI" }, // pfp3.png
  { nombre: "Aislandart",     rareza: "common",    link: "https://x.com/aislandart" }, // pfp4.png
  { nombre: "enne_rhn",       rareza: "rare",      link: "https://x.com/enne_rhn96" }, // pfp5.png
  { nombre: "sunnydayz.eth",  rareza: "common",    link: "https://x.com/sunnydayzsoon" }, // pfp6.png
  { nombre: "reylarsdam",     rareza: "epic",      link: "https://x.com/reylarsdam" }, // pfp7.png
  { nombre: "EightyEight",    rareza: "epic",      link: "" }, // pfp8.png
  { nombre: "VJdeliria",      rareza: "epic",      link: "https://x.com/VJdeliria" }, // pfp9.png
  { nombre: "Blue2black",     rareza: "rare",      link: "https://x.com/Blue2black" }, // pfp10.png
  { nombre: "nikolekapo_nft", rareza: "rare",      link: "https://x.com/nikolekapo_nft" }, // pfp11.png
  { nombre: "wallplugnft",    rareza: "rare",      link: "https://x.com/wallplugnft" }, // pfp12.png
  { nombre: "Adolfochs",      rareza: "epic",      link: "https://x.com/Adolfochs" }, // pfp13.png
  { nombre: "sashelka",       rareza: "rare",      link: "https://x.com/sashelka" }, // pfp14.png
  { nombre: "Chrisland",      rareza: "rare",      link: "https://x.com/Chrisland1405" }, // pfp15.png
  { nombre: "EmpressTrash",   rareza: "common",    link: "https://x.com/EmpressTrash" }, // pfp16.png
  { nombre: "mtropedroangel", rareza: "legendary", link: "https://x.com/mtropedroangel" }, // pfp17.png
  { nombre: "gulbakanozge",   rareza: "common",    link: "https://x.com/gulbakanozge" },  // pfp18.png
  { nombre: "StrokeDriven",   rareza: "common",    link: "https://x.com/StrokeDriven" },  // pfp19.png
  { nombre: "Aoifeodwyer",   rareza: "common",    link: "https://x.com/Aoifeodwyer" },  // pfp20.png
  { nombre: "Ivonnespectre",   rareza: "common",  link: "https://x.com/Ivonnespectre" },  // pfp21.png
  { nombre: "ernestoasch",   rareza: "common",  link: "https://x.com/ernestoasch" }  // pfp22.png
];

function cargarConSeguridad(ruta) {
  return loadImage(ruta, 
    img => console.log("Cargado ok: " + ruta), 
    err => {
      console.error("Error cargando: " + ruta);
      archivosRotos.push(ruta);
    }
  );
}

function preload() {
  bg = cargarConSeguridad("obra-background.jpg"); 
  marcoCommon = cargarConSeguridad("marco-common.png");
  marcoRare = cargarConSeguridad("marco-rare.png");
  marcoEpic = cargarConSeguridad("marco-epic.png");
  marcoLegendary = cargarConSeguridad("marco-legendary.png");
  logoArtista = cargarConSeguridad("logo-artista.png"); 
  marcoArtist = cargarConSeguridad("marco-artista.png"); 
  
  for (let i = 0; i < datosArtistas.length; i++) {
    let indexArchivo = i + 1;
    let rutaPFP = `pfp${indexArchivo}.png`; 
    datosArtistas[i].imgCargada = cargarConSeguridad(rutaPFP);
  }
}

function setup() {
  createCanvas(windowWidth, windowHeight);
  initFloatingSystem();
  cargarArtistasManuales();
}

function initFloatingSystem() {
  frames = [];
  
  let tamañoLogo = 100; 
  frames.push({
    pfp: logoArtista, 
    rarity: "artist", 
    nombre: "Buda Studio",
    link: "https://x.com/budastudio_nft", 
    isFixed: true, 
    x: random(width * 0.2, width * 0.8), 
    y: random(height * 0.2, height * 0.8),
    size: tamañoLogo,
    vx: random(-0.15, 0.15), 
    vy: random(-0.15, 0.15), 
    t: random(1000),
    radius: tamañoLogo / 2,
    isDragging: false
  });

  for (let i = 0; i < 30; i++) { // Bajado a 30 para compensar los 11 reales
    let tamaño = random(70, 115);
    let rarezas = ["common", "rare", "epic", "legendary"];
    let r = random() > 0.85 ? random(rarezas.slice(1)) : "common"; 
    
    frames.push({
      pfp: null, 
      rarity: r,
      nombre: "", 
      link: null,
      isFixed: false,
      x: random(0, width - tamaño),
      y: random(0, height - tamaño),
      size: tamaño,
      vx: random(-0.2, 0.2), 
      vy: random(-0.2, 0.2), 
      t: random(1000),
      col: color(random(100, 255), random(100, 255), random(220, 255)),
      radius: tamaño / 2,
      isDragging: false
    });
  }
}

function cargarArtistasManuales() {
  for (let i = 0; i < datosArtistas.length; i++) {
    let artista = datosArtistas[i];
    let tamaño = random(95, 130);
    
    frames.push({
      pfp: artista.imgCargada,
      rarity: artista.rareza,
      nombre: artista.nombre,
      link: artista.link || null,
      isFixed: false,
      x: random(0, width - tamaño),
      y: random(0, height - tamaño),
      size: tamaño,
      vx: random(-0.25, 0.25), 
      vy: random(-0.25, 0.25),
      t: random(1000),
      radius: tamaño / 2,
      isDragging: false
    });
  }
}

function draw() {
  if (archivosRotos.length > 0) {
    background(20, 10, 15);
    fill(255, 50, 50);
    textSize(20);
    textAlign(LEFT, TOP);
    text("⚠️ ERROR DE CARGA EN GITHUB:", 30, 30);
    textSize(14);
    fill(200);
    text("Asegurate de que estos archivos existan en la raíz junto al index.html:", 30, 60);
    fill(255, 100, 100);
    for (let i = 0; i < archivosRotos.length; i++) {
      text("- " + archivosRotos[i], 40, 100 + (i * 22));
    }
    return;
  }

  if (bg && bg.width > 1) {
    image(bg, 0, 0, width, height);
  } else {
    background(12, 12, 14);
  }
  
  // Lógica activa para arrastrar objetos con el mouse
  actualizarArrastre();

  aplicarColisiones();

  let cuadroInteractuado = null;
  let alguienTieneFocus = false;

  for (let f of frames) {
    drawAndMoveFrame(f);
    
    let centroX = f.x + f.radius;
    let centroY = f.y + f.radius;
    let d = dist(mouseX, mouseY, centroX, centroY);
    
    if ((d < f.radius || f.isDragging) && f.nombre !== "") {
      cuadroInteractuado = f;
      if (f.link) alguienTieneFocus = true;
    }
  }

  if (alguienTieneFocus || cuadroArrastrado) {
    cursor(HAND);
  } else {
    cursor(ARROW);
  }

  if (cuadroInteractuado) {                    
    let textoCartel = cuadroInteractuado.link ? `${cuadroInteractuado.nombre} 🔗` : cuadroInteractuado.nombre;
    dibujarCartelNombre(textoCartel, mouseX, mouseY);
  }
}

function drawAndMoveFrame(f) {
  // Solo se mueve solo si NO se está arrastrando en este momento
  if (!f.isDragging) {
    f.x += f.vx;
    f.y += f.vy;

    if (f.x < 0 || f.x > width - f.size) f.vx *= -1;
    if (f.y < 0 || f.y > height - f.size) f.vy *= -1;
  }

  push();
  translate(f.x, f.y);

  let centroX_local = f.radius;
  let centroY_local = f.radius;
  let dMouse = dist(mouseX, mouseY, f.x + centroX_local, f.y + centroY_local);
  
  if ((dMouse < f.radius || f.isDragging) && f.nombre !== "") {
    noStroke();
    for (let i = 15; i > 0; i--) {
      fill(255, 215, 0, 15 - i); 
      ellipse(centroX_local, centroY_local, f.size + (i * 4));
    }
  }

  if (f.pfp && f.pfp.width > 1) {
    image(f.pfp, 0, 0, f.size, f.size);
  } else {
    let pulse = sin(frameCount * 0.02 + f.t) * 15;
    fill(red(f.col), green(f.col), blue(f.col), 25 + pulse);
    noStroke();
    rect(0, 0, f.size, f.size);
    
    fill(255, 40 + pulse);
    if (f.rarity === "legendary" || f.rarity === "epic") {
      ellipse(f.size/2, f.size/2, f.size * 0.4);
    }
  }

  if (f.rarity === "artist") {
    let marcoParaDibujar = (marcoArtist && marcoArtist.width > 1) ? marcoArtist : marcoLegendary;
    if (marcoParaDibujar && marcoParaDibujar.width > 1) image(marcoParaDibujar, 0, 0, f.size, f.size);
  }
  else if (f.rarity === "common" && marcoCommon && marcoCommon.width > 1) image(marcoCommon, 0, 0, f.size, f.size);
  else if (f.rarity === "rare" && marcoRare && marcoRare.width > 1) image(marcoRare, 0, 0, f.size, f.size);
  else if (f.rarity === "epic" && marcoEpic && marcoEpic.width > 1) image(marcoEpic, 0, 0, f.size, f.size);
  else if (f.rarity === "legendary" && marcoLegendary && marcoLegendary.width > 1) image(marcoLegendary, 0, 0, f.size, f.size);

  pop();
}

function aplicarColisiones() {
  for (let i = 0; i < frames.length; i++) {
    for (let j = i + 1; j < frames.length; j++) {
      let f1 = frames[i];
      let f2 = frames[j];

      let c1x = f1.x + f1.radius;
      let c1y = f1.y + f1.radius;
      let c2x = f2.x + f2.radius;
      let c2y = f2.y + f2.radius;

      let dx = c2x - c1x;
      let dy = c2y - c1y;
      let distancia = sqrt(dx * dx + dy * dy);
      let distanciaMinima = f1.radius + f2.radius;

      if (distancia < distanciaMinima) {
        let angulo = atan2(dy, dx);
        let superposicion = distanciaMinima - distancia;
        
        // El que se está arrastrando tiene "masa infinita", no se deja mover por otros
        if (f1.isDragging) {
          f2.x += cos(angulo) * superposicion;
          f2.y += sin(angulo) * superposicion;
          f2.vx += cos(angulo) * 0.1;
          f2.vy += sin(angulo) * 0.1;
        } else if (f2.isDragging) {
          f1.x -= cos(angulo) * superposicion;
          f1.y -= sin(angulo) * superposicion;
          f1.vx -= cos(angulo) * 0.1;
          f1.vy -= sin(angulo) * 0.1;
        } else {
          // Rebote normal si ambos flotan libres
          f1.x -= cos(angulo) * (superposicion * 0.5);
          f1.y -= sin(angulo) * (superposicion * 0.5);
          f2.x += cos(angulo) * (superposicion * 0.5);
          f2.y += sin(angulo) * (superposicion * 0.5);

          let ax = cos(angulo) * 0.04;
          let ay = sin(angulo) * 0.04;
          f1.vx -= ax;
          f1.vy -= ay;
          f2.vx += ax;
          f2.vy += ay;
        }
      }
    }
  }
}

// =========================================================================
// 🖱️ NUEVAS FUNCIONES DE INTERACCIÓN MOUSE / DRAG & DROP
// =========================================================================

function mousePressed() {
  // Buscamos si el usuario hizo clic justo adentro de alguna burbuja
  for (let f of frames) {
    let centroX = f.x + f.radius;
    let centroY = f.y + f.radius;
    let d = dist(mouseX, mouseY, centroX, centroY);
    
    if (d < f.radius) {
      cuadroArrastrado = f;
      f.isDragging = true;
      fueArrastrado = false;
      // Guardamos la distancia exacta del clic al centro para que el arrastre sea súper suave
      distCentroX = mouseX - f.x;
      distCentroY = mouseY - f.y;
      mouseXAnterior = mouseX;
      mouseYAnterior = mouseY;
      break;
    }
  }
}

function actualizarArrastre() {
  if (cuadroArrastrado) {
    // Mueve la burbuja siguiendo la posición del mouse
    cuadroArrastrado.x = mouseX - distCentroX;
    cuadroArrastrado.y = mouseY - distCentroY;
    
    // Mantener la burbuja dentro de los límites de la pantalla mientras se arrastra
    if (cuadroArrastrado.x < 0) cuadroArrastrado.x = 0;
    if (cuadroArrastrado.x > width - cuadroArrastrado.size) cuadroArrastrado.x = width - cuadroArrastrado.size;
    if (cuadroArrastrado.y < 0) cuadroArrastrado.y = 0;
    if (cuadroArrastrado.y > height - cuadroArrastrado.size) cuadroArrastrado.y = height - cuadroArrastrado.size;

    // Si el mouse se movió significativamente, confirmamos que es un Drag
    if (dist(mouseX, mouseY, mouseXAnterior, mouseYAnterior) > 2) {
      fueArrastrado = true;
    }
  }
}

function mouseReleased() {
  if (cuadroArrastrado) {
    cuadroArrastrado.isDragging = false;
    
    // Calcula la velocidad de lanzamiento basándose en el último movimiento del mouse
    let fuerzaLanzamiento = 0.15;
    cuadroArrastrado.vx = (mouseX - mouseXAnterior) * fuerzaLanzamiento;
    cuadroArrastrado.vy = (mouseY - mouseYAnterior) * fuerzaLanzamiento;
    
    // Ponemos un límite de velocidad para que no salga disparado de forma descontrolada
    let limiteVelocidad = 3;
    cuadroArrastrado.vx = constrain(cuadroArrastrado.vx, -limiteVelocidad, limiteVelocidad);
    cuadroArrastrado.vy = constrain(cuadroArrastrado.vy, -limiteVelocidad, limiteVelocidad);
    
    // Si la soltamos casi quieta, le damos un empujoncito aleatorio para que no quede muerta
    if (abs(cuadroArrastrado.vx) < 0.05 && abs(cuadroArrastrado.vy) < 0.05) {
      cuadroArrastrado.vx = random(-0.2, 0.2);
      cuadroArrastrado.vy = random(-0.2, 0.2);
    }

    cuadroArrastrado = null;
  }
}

function mouseClicked() {
  // Solo abrimos el link si el usuario hizo un click limpio y NO arrastró la burbuja
  if (!fueArrastrado) {
    for (let f of frames) {
      let centroX = f.x + f.radius;
      let centroY = f.y + f.radius;
      let d = dist(mouseX, mouseY, centroX, centroY);
      
      if (d < f.radius && f.link && f.link !== "") {
        window.open(f.link, '_blank'); 
        break; 
      }
    }
  }
}

function dibujarCartelNombre(txt, mx, my) {
  push();
  textSize(14);
  let txtWidth = textWidth(txt) + 20;
  let txtHeight = 28;
  let cx = mx + 15;
  let cy = my - 15;
  if (cx + txtWidth > width) cx = mx - txtWidth - 5;
  if (cy + txtHeight > height) cy = height - txtHeight - 5;

  fill(15, 15, 18, 240);
  stroke(255, 255, 255, 50);
  strokeWeight(1);
  rect(cx, cy, txtWidth, txtHeight, 6);

  noStroke();
  fill(255);
  textAlign(CENTER, CENTER);
  text(txt, cx + txtWidth / 2, cy + txtHeight / 2);
  pop();
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>
