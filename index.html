<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buda Collective Artist - Live Web3</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.min.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #0c0c0e; }
        canvas { display: block; }
    </style>
</head>
<body>

<script>
let bg;
let frames = [];
let maxFrames = 80;

// Tu contrato oficial de Transient Labs en Base
const CONTRACT_ADDRESS = "0x303dd729601a44262f848ecc9950514c97ba3081";
const CHAIN_ID = 8453; 

// Variables para imágenes fijas
let marcoCommon, marcoRare, marcoEpic, marcoLegendary, marcoArtist;
let logoArtista;

function preload() {
  // 1. Carga del fondo de la obra
  bg = loadImage("obra-background.jpg"); 
  
  // 2. Carga de los marcos estándar (Deben estar en tu repositorio)
  marcoCommon = loadImage("marco-common.png");
  marcoRare = loadImage("marco-rare.png");
  marcoEpic = loadImage("marco-epic.png");
  marcoLegendary = loadImage("marco-legendary.png");
  
// 3. Carga de tu Logotipo y su Marco de Artista en PNG
  logoArtista = loadImage("logo-artista.png"); 
  marcoArtist = loadImage("marco-artista.png"); 
}

function setup() {
  createCanvas(windowWidth, windowHeight);
  initFloatingSystem();
  
  // Conexión Web3 activa
  fetchTransientNFTs();
}

function initFloatingSystem() {
  frames = [];
  
  // 🎨 TU LOGO FIJO PRINCIPAL (Siempre aparece primero)
  let tamañoLogo = 100; 
  frames.push({
    pfp: logoArtista, 
    rarity: "artist", 
    isFixed: true, 
    x: random(width * 0.2, width * 0.8), 
    y: random(height * 0.2, height * 0.8),
    size: tamañoLogo,
    vx: random(-0.15, 0.15), 
    vy: random(-0.15, 0.15), 
    t: random(1000)
  });

  // Los 49 cuadros místicos iniciales genéricos
  for (let i = 0; i < 49; i++) {
    let tamaño = random(70, 115);
    let rarezas = ["common", "rare", "epic", "legendary"];
    let r = random() > 0.85 ? random(rarezas.slice(1)) : "common"; 
    
    frames.push({
      pfp: null, 
      rarity: r,
      isFixed: false,
      x: random(0, width - tamaño),
      y: random(0, height - tamaño),
      size: tamaño,
      vx: random(-0.2, 0.2), 
      vy: random(-0.2, 0.2), 
      t: random(1000),
      col: color(random(100, 255), random(100, 255), random(220, 255)) 
    });
  }
}

async function fetchTransientNFTs() {
  try {
    let response = await fetch(`https://api.transient.xyz/v1/nft/${CHAIN_ID}/${CONTRACT_ADDRESS}/tokens`);
    if (!response.ok) return;
    let data = await response.json();
    
    if (data && data.tokens) {
      for (let token of data.tokens) {
        let imageUrl = token.metadata?.image || token.token_uri;
        if (imageUrl && imageUrl.startsWith("ipfs://")) {
          imageUrl = imageUrl.replace("ipfs://", "https://ipfs.io/ipfs/");
        }
        
        let rarity = token.metadata?.attributes?.find(a => a.trait_type?.toLowerCase() === 'rarity')?.value || "common";
        
        if (imageUrl) {
          addRealPFP(imageUrl, rarity.toLowerCase());
        }
      }
    }
  } catch (error) {
    console.error("Error cargando los PFPs de Transient Labs:", error);
  }
}

function draw() {
  image(bg, 0, 0, width, height);
  for (let f of frames) {
    drawAndMoveFrame(f);
  }
}

function drawAndMoveFrame(f) {
  f.x += f.vx;
  f.y += f.vy;

  if (f.x < 0 || f.x > width - f.size) f.vx *= -1;
  if (f.y < 0 || f.y > height - f.size) f.vy *= -1;

  push();
  translate(f.x, f.y);

  // 1. Capa de Fondo (Si hay logo/PFP dibuja la imagen, si no, el abstracto)
  if (f.pfp) {
    image(f.pfp, 0, 0, f.size, f.size);
  } else {
    let pulse = sin(frameCount * 0.02 + f.t) * 15;
    fill(red(f.col), green(f.col), blue(f.col), 25 + pulse);
    noStroke();
    rect(0, 0, f.size, f.size);
    
    fill(255, 40 + pulse);
    if (f.rarity === "legendary" || f.rarity === "epic") {
      ellipse(f.size/2, f.size/2, f.size * 0.4);
    }
  }

// 2. Capa de Frente (El marco PNG transparente encima)
  if (f.rarity === "artist") {
    // Si no encuentra marco-artista.png usa el legendary de respaldo automáticamente
    let marcoParaDibujar = (marcoArtist && marcoArtist.width > 1) ? marcoArtist : marcoLegendary;
    image(marcoParaDibujar, 0, 0, f.size, f.size);
  }
  else if (f.rarity === "common") image(marcoCommon, 0, 0, f.size, f.size);
  else if (f.rarity === "rare") image(marcoRare, 0, 0, f.size, f.size);
  else if (f.rarity === "epic") image(marcoEpic, 0, 0, f.size, f.size);
  else if (f.rarity === "legendary") image(marcoLegendary, 0, 0, f.size, f.size);

  pop();
}

function addRealPFP(url, rarity = "common") {
  loadImage(url, (img) => {
    if (frames.length >= maxFrames) {
      let indexToRemove = frames.findIndex(f => !f.isFixed);
      if (indexToRemove !== -1) frames.splice(indexToRemove, 1);
    }

    let tamaño = random(90, 140);
    frames.push({
      pfp: img,
      rarity: rarity,
      isFixed: false,
      x: random(0, width - tamaño),
      y: random(0, height - tamaño),
      size: tamaño,
      vx: random(-0.25, 0.25), 
      vy: random(-0.25, 0.25),
      t: random(1000)
    });
  });
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>

</body>
</html>
