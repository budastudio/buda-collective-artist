<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buda Collective Artist - Live Showcase</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.min.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #0c0c0e; }
        canvas { display: block; }
    </style>
</head>
<body>

<script>
let bg;
let frames = [];
let maxFrames = 80;

// Variables para imágenes fijas
let marcoCommon, marcoRare, marcoEpic, marcoLegendary, marcoArtist;
let logoArtista;

// Lista de archivos que fallaron al cargar (para mostrártelo en pantalla si pasa)
let archivosRotos = [];

// =========================================================================
// 🔧 CONTROL DE ARTISTAS MANUAL (Configurá acá tus 3 primeros amigos)
// =========================================================================
const datosArtistas = [
  { nombre: "Dorthys",     rareza: "rare" },       // Busca pfp1.png
  { nombre: "Victor Hugo", rareza: "legendary" },  // Busca pfp2.png
  { nombre: "Emoji",       rareza: "epic" },       // <--- ¡Faltaba esta coma! (Busca pfp3.png)
  { nombre: "Aislandart",    rareza: "common" },     // <--- ¡Faltaba esta coma! (Busca pfp4.png)
  { nombre: "enne_rhn",  rareza: "epic" }        // El último no la necesita (Busca pfp5.png)
];

function cargarConSeguridad(ruta) {
  return loadImage(ruta, 
    img => console.log("Cargado ok: " + ruta), 
    err => {
      console.error("Error cargando: " + ruta);
      archivosRotos.push(ruta);
    }
  );
}

function preload() {
  // Cargamos todo con la función segura para que no congele el sistema
  bg = cargarConSeguridad("obra-background.jpg"); 
  marcoCommon = cargarConSeguridad("marco-common.png");
  marcoRare = cargarConSeguridad("marco-rare.png");
  marcoEpic = cargarConSeguridad("marco-epic.png");
  marcoLegendary = cargarConSeguridad("marco-legendary.png");
  logoArtista = cargarConSeguridad("logo-artista.png"); 
  marcoArtist = cargarConSeguridad("marco-artista.png"); 
  
  // Carga de las PFPs locales
  for (let i = 0; i < datosArtistas.length; i++) {
    let indexArchivo = i + 1;
    let rutaPFP = `pfp${indexArchivo}.png`;
    datosArtistas[i].imgCargada = cargarConSeguridad(rutaPFP);
  }
}

function setup() {
  createCanvas(windowWidth, windowHeight);
  initFloatingSystem();
  cargarArtistasManuales();
}

function initFloatingSystem() {
  frames = [];
  
  let tamañoLogo = 100; 
  frames.push({
    pfp: logoArtista, 
    rarity: "artist", 
    nombre: "Buda Studio",
    isFixed: true, 
    x: random(width * 0.2, width * 0.8), 
    y: random(height * 0.2, height * 0.8),
    size: tamañoLogo,
    vx: random(-0.15, 0.15), 
    vy: random(-0.15, 0.15), 
    t: random(1000)
  });

  for (let i = 0; i < 46; i++) {
    let tamaño = random(70, 115);
    let rarezas = ["common", "rare", "epic", "legendary"];
    let r = random() > 0.85 ? random(rarezas.slice(1)) : "common"; 
    
    frames.push({
      pfp: null, 
      rarity: r,
      nombre: "", 
      isFixed: false,
      x: random(0, width - tamaño),
      y: random(0, height - tamaño),
      size: tamaño,
      vx: random(-0.2, 0.2), 
      vy: random(-0.2, 0.2), 
      t: random(1000),
      col: color(random(100, 255), random(100, 255), random(220, 255)) 
    });
  }
}

function cargarArtistasManuales() {
  for (let i = 0; i < datosArtistas.length; i++) {
    let artista = datosArtistas[i];
    let tamaño = random(90, 140);
    
    frames.push({
      pfp: artista.imgCargada,
      rarity: artista.rareza,
      nombre: artista.nombre,
      isFixed: false,
      x: random(0, width - tamaño),
      y: random(0, height - tamaño),
      size: tamaño,
      vx: random(-0.25, 0.25), 
      vy: random(-0.25, 0.25),
      t: random(1000)
    });
  }
}

function draw() {
  // Si hay archivos rotos, te lo mostramos en una lista roja en pantalla
  if (archivosRotos.length > 0) {
    background(20, 10, 15);
    fill(255, 50, 50);
    textSize(20);
    textAlign(LEFT, TOP);
    text("⚠️ ERROR DE CARGA EN GITHUB:", 30, 30);
    textSize(14);
    fill(200);
    text("Asegurate de que estos archivos existan en tu repositorio con este nombre exacto (ojo mayúsculas):", 30, 60);
    
    fill(255, 100, 100);
    for (let i = 0; i < archivosRotos.length; i++) {
      text("- " + archivosRotos[i], 40, 100 + (i * 22));
    }
    return; // Frena el dibujo para que veas el error
  }

  // Si todo cargó bien, corre tu animación original
  if (bg && bg.width > 1) {
    image(bg, 0, 0, width, height);
  } else {
    background(12, 12, 14);
  }
  
  let cuadroInteractuado = null;

  for (let f of frames) {
    drawAndMoveFrame(f);
    if (mouseX > f.x && mouseX < f.x + f.size && mouseY > f.y && mouseY < f.y + f.size) {
      if (f.nombre !== "") cuadroInteractuado = f;
    }
  }

  if (cuadroInteractuado) {
    dibujarCartelNombre(cuadroInteractuado.nombre, mouseX, mouseY);
  }
}

function drawAndMoveFrame(f) {
  f.x += f.vx;
  f.y += f.vy;

  if (f.x < 0 || f.x > width - f.size) f.vx *= -1;
  if (f.y < 0 || f.y > height - f.size) f.vy *= -1;

  push();
  translate(f.x, f.y);

  if (f.pfp && f.pfp.width > 1) {
    image(f.pfp, 0, 0, f.size, f.size);
  } else {
    let pulse = sin(frameCount * 0.02 + f.t) * 15;
    fill(red(f.col), green(f.col), blue(f.col), 25 + pulse);
    noStroke();
    rect(0, 0, f.size, f.size);
    
    fill(255, 40 + pulse);
    if (f.rarity === "legendary" || f.rarity === "epic") {
      ellipse(f.size/2, f.size/2, f.size * 0.4);
    }
  }

  if (f.rarity === "artist") {
    let marcoParaDibujar = (marcoArtist && marcoArtist.width > 1) ? marcoArtist : marcoLegendary;
    if (marcoParaDibujar && marcoParaDibujar.width > 1) image(marcoParaDibujar, 0, 0, f.size, f.size);
  }
  else if (f.rarity === "common" && marcoCommon && marcoCommon.width > 1) image(marcoCommon, 0, 0, f.size, f.size);
  else if (f.rarity === "rare" && marcoRare && marcoRare.width > 1) image(marcoRare, 0, 0, f.size, f.size);
  else if (f.rarity === "epic" && marcoEpic && marcoEpic.width > 1) image(marcoEpic, 0, 0, f.size, f.size);
  else if (f.rarity === "legendary" && marcoLegendary && marcoLegendary.width > 1) image(marcoLegendary, 0, 0, f.size, f.size);

  pop();
}

function dibujarCartelNombre(txt, mx, my) {
  push();
  textSize(14);
  let txtWidth = textWidth(txt) + 20;
  let txtHeight = 28;
  let cx = mx + 15;
  let cy = my - 15;
  if (cx + txtWidth > width) cx = mx - txtWidth - 5;
  if (cy + txtHeight > height) cy = height - txtHeight - 5;

  fill(15, 15, 18, 230);
  stroke(255, 255, 255, 40);
  strokeWeight(1);
  rect(cx, cy, txtWidth, txtHeight, 6);

  noStroke();
  fill(255);
  textAlign(CENTER, CENTER);
  text(txt, cx + txtWidth / 2, cy + txtHeight / 2);
  pop();
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>

</body>
</html>
